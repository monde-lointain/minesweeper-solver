name: CI

on:
  push:
  pull_request:

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain and SDL build dependencies
        run: |
          sudo apt-get update
          # SDL3 video/audio backend headers so FetchContent SDL configures fully.
          sudo apt-get install -y --no-install-recommends \
            cmake \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxfixes-dev libxss-dev libwayland-dev wayland-protocols \
            libxkbcommon-dev libegl1-mesa-dev libgl1-mesa-dev libgles2-mesa-dev \
            libasound2-dev libpulse-dev libudev-dev
          # clang-22 (matches the Orthodoxy plugin locally; plugin is optional in CI).
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y clang-tidy-22 || true

      - name: Configure
        run: >
          cmake -B build -S .
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER=clang-22
          -DCMAKE_CXX_COMPILER=clang++-22

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: clang-tidy
        run: cmake --build build --target tidy

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j"$(sysctl -n hw.ncpu)"

      - name: Test
        run: ctest --test-dir build --output-on-failure

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -S .

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure
